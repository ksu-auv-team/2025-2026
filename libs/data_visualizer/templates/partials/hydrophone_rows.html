{% for row in rows %}
<tr class="border-b border-gray-800 hover:bg-gray-800/40 text-sm">
  <td class="px-3 py-2 text-gray-400">{{ row.ID }}</td>
  <td class="px-3 py-2 font-mono text-yellow-400">{{ row.HEADING }}</td>
  <td class="px-3 py-2 text-gray-500 text-xs">{{ row.TIMESTAMP }}</td>
</tr>
{% else %}
<tr>
  <td colspan="3" class="px-3 py-6 text-center text-gray-600">No data</td>
</tr>
{% endfor %}
