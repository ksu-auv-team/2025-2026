{% for row in rows %}
<tr class="border-b border-gray-800 hover:bg-gray-800/40 text-sm">
  <td class="px-3 py-2 text-gray-400">{{ row.ID }}</td>
  <td class="px-3 py-2">{{ row.SURGE }}</td>
  <td class="px-3 py-2">{{ row.SWAY }}</td>
  <td class="px-3 py-2">{{ row.HEAVE }}</td>
  <td class="px-3 py-2">{{ row.ROLL }}</td>
  <td class="px-3 py-2">{{ row.PITCH }}</td>
  <td class="px-3 py-2">{{ row.YAW }}</td>
  <td class="px-3 py-2">{{ row.S1 }}</td>
  <td class="px-3 py-2">{{ row.S2 }}</td>
  <td class="px-3 py-2">{{ row.S3 }}</td>
  <td class="px-3 py-2">
    {% if row.ARM %}
      <span class="text-green-400">Armed</span>
    {% else %}
      <span class="text-gray-500">Disarmed</span>
    {% endif %}
  </td>
  <td class="px-3 py-2 text-gray-500 text-xs">{{ row.TIMESTAMP }}</td>
</tr>
{% else %}
<tr>
  <td colspan="12" class="px-3 py-6 text-center text-gray-600">No data</td>
</tr>
{% endfor %}
