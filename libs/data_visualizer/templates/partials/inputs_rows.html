{% for row in rows %}
<tr class="border-b border-gray-800 hover:bg-gray-800/40">
  <td class="px-3 py-2">{{ row.id }}</td>
  <td class="px-3 py-2">{{ row.step_index }}</td>
  <td class="px-3 py-2">{{ row.x }}</td>
  <td class="px-3 py-2">{{ row.y }}</td>
  <td class="px-3 py-2">{{ row.z }}</td>
  <td class="px-3 py-2">{{ row.yaw }}</td>
  <td class="px-3 py-2">{{ row.arm }}</td>
  <td class="px-3 py-2 text-gray-400 text-xs">{{ row.timestamp }}</td>
</tr>
{% else %}
<tr><td colspan="8" class="px-3 py-4 text-center text-gray-500">No data</td></tr>
{% endfor %}
